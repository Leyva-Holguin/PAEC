<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %}Calculadora IMC{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('index') }}">Calculadora IMC</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('info') }}">info</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('imc') }}">Calculadora IMC</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('historial') }}">Historial</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('historial') }}">historia</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('quimica') }}">quimica</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <main>
        {% block contenido %}
        {% endblock %}
    </main>
    <footer class="bg-dark text-white text-center py-3 mt-4">
        <div class="container">
            <p class="mb-0">© 2024 Calculadora IMC - Tu salud es importante</p>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
